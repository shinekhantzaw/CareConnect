<section class="rounded-3xl border border-slate-200 bg-white p-4 shadow-sm sm:p-6">
  <label for="resource-search" class="mb-3 block text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">
    Search Fort Wayne resources
  </label>

  <div class="flex flex-col gap-3 sm:flex-row">
    <div class="relative flex-1">
      <svg
        class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.3-4.3"></path>
      </svg>

      <input
        id="resource-search"
        type="text"
        [(ngModel)]="searchQuery"
        (keyup.enter)="executeSearch()"
        placeholder="Search by service, neighborhood, or organization"
        class="w-full rounded-2xl border border-slate-300 bg-slate-50 py-4 pl-12 pr-4 text-base text-slate-900 outline-none ring-0 transition placeholder:text-slate-400 focus:border-emerald-500 focus:bg-white"
      />
    </div>

    <button
      type="button"
      (click)="executeSearch()"
      class="inline-flex items-center justify-center rounded-2xl bg-emerald-600 px-6 py-4 text-base font-semibold text-white transition hover:bg-emerald-500"
    >
      Search
    </button>
  </div>
</section>
